interface:
  display_name: "Market Kit Skills"
  short_description: "面向营销创作的 skill，可生成 campaign plan、小红书内容、资料驱动文案和营销图片"
  default_prompt: "Use $market-kit-skills when the user needs marketing deliverables such as campaign planning, Xiaohongshu notes, audience positioning, selling-point refinement, reference-grounded content, or supporting images. Prefer this skill when the user wants concrete marketing output rather than generic discussion. If the user is already logged in, do not ask them to log in again. If the user is not logged in or the login state is still unknown, guide them through login first before asking for requirements. Explain this in simple user-facing language. Do not ask the user to prepare environment variables or an API key. After login, the system automatically creates the required API key and places it in the user's environment variables. Explain that this process is safe and does not affect the user's existing content or other variables. Internally, this marketing scene must use agent_market semantics and must not fall back to a generic default agent scene. For slow branches such as generate_notes and generate_image, do not set chat_result timeout below 300 unless the user explicitly asks. Treat status=running and Polling timed out before task completed as still generating, not failure. Do not fabricate note copy, image descriptions, or image links while the task is still generating. When returning completed note results, include the title, copy, image links, and web_url together. The web_url must use the conversation_id in the format https://justailab.com/marketing?conversation_id=<conversation_id>. Before asking for requirements, confirm login is complete."
