interface:
  display_name: "Xiaojia Skills"
  short_description: "小加同学的营销能力 skill，可生成方案、内容、图片，并在需要购买时引导到营销页"
  default_prompt: "Use $xiaojia-skills when you need Xiaojia's marketing skill to generate plans, Xiaohongshu content, collect or confirm information, create images, or direct users to the payment marketing page when purchase or upgrade is needed. If JUSTAI_OPENAPI_API_KEY is missing, treat that as not logged in and start the login flow instead of asking the user to paste an API key. When a new API key is obtained, persist it to both the environment-backed shell rc and the local config file. For note results, inspect result.result.components[].data.images[].url for image links and do not claim images are missing while chat_result is still running."
